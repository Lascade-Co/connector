name: eSIM Facebook Ads Daily ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

jobs:
  esim_facebook_etl:
    strategy:
      matrix:
        group: [d1]
      fail-fast: false
      max-parallel: 1
    uses: ./.github/workflows/_reusable-etl.yml
    with:
      pipeline: esim_facebook
      group: ${{ matrix.group }}
    secrets: inherit
