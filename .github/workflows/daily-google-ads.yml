name: Google Ads Daily ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"  # Every day at 23:30 UTC (05:00 IST next day, before Facebook batches; crosses UTC midnight)

jobs:
  google_ads_d1:
    uses: ./.github/workflows/_reusable-etl.yml
    with:
      pipeline: google
      group: d1
    secrets: inherit
