name: Subscription Facebook Ads Daily ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Every day at 03:00 UTC (08:30 IST, after Facebook batch C)

jobs:
  subscription_facebook_etl:
    strategy:
      matrix:
        group: [ta1]
      fail-fast: false
      max-parallel: 1
    uses: ./.github/workflows/_reusable-etl.yml
    with:
      pipeline: subscription_facebook
      group: ${{ matrix.group }}
    secrets: inherit