name: Subscription Google Ads Daily ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "50 2 * * *"  # Every day at 02:50 UTC (08:20 IST)

jobs:
  subscription_google_etl:
    strategy:
      matrix:
        group: [ta1]
      fail-fast: false
      max-parallel: 1
    uses: ./.github/workflows/_reusable-etl.yml
    with:
      pipeline: subscription_google
      group: ${{ matrix.group }}
    secrets: inherit
