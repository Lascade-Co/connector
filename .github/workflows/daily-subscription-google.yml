name: Subscription Google Ads Daily ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"  # 00:20 UTC, 10 min after subscription-facebook

jobs:
  subscription_google_etl:
    strategy:
      matrix:
        group: [ta1]
      fail-fast: false
      max-parallel: 1
    uses: ./.github/workflows/_reusable-etl.yml
    with:
      pipeline: subscription_google
      group: ${{ matrix.group }}
    secrets: inherit
